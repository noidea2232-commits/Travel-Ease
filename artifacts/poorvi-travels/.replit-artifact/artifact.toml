kind = "web"
previewPath = "/"
title = "Poorvi Best Travels"
version = "1.0.0"
id = "artifacts/poorvi-travels"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21263

[services.development]
run = "pnpm --filter @workspace/poorvi-travels run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/poorvi-travels", "run", "build" ]
publicDir = "artifacts/poorvi-travels/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21263"
BASE_PATH = "/"
